<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads Audit</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #58a6ff, #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8b949e;
            margin-bottom: 40px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-label {
            color: #8b949e;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
        }

        .chart-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #e6edf3;
        }

        .files-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
        }

        .files-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #e6edf3;
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #0d1117;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #21262d;
        }

        .file-rank {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #58a6ff, #a371f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-date {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 4px;
        }

        .file-size {
            font-weight: 600;
            color: #f0883e;
            margin-left: 16px;
            flex-shrink: 0;
        }

        .size-label {
            color: #f0883e;
            font-size: 1.3rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Downloads Audit</h1>
        <p class="subtitle">Анализ содержимого папки ~/Downloads</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">3 275</div>
                <div class="stat-label">Файлов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">8.3 ГБ</div>
                <div class="stat-label">Общий размер</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">2 990</div>
                <div class="stat-label">Изображений (png/jpg/jpeg)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">402</div>
                <div class="stat-label">Документов (pdf/docx)</div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-title">Типы файлов</div>
                <canvas id="typesChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Топ-10 расширений</div>
                <canvas id="extensionsChart"></canvas>
            </div>
        </div>

        <div class="files-card">
            <div class="files-title">Самые большие файлы</div>
            <div id="filesList"></div>
        </div>
    </div>

    <script>
        const fileTypes = [
            { type: 'PNG', count: 1290, color: '#58a6ff' },
            { type: 'JPG', count: 698, color: '#a371f7' },
            { type: 'PDF', count: 311, color: '#f778ba' },
            { type: 'Strings', count: 229, color: '#3fb950' },
            { type: 'JPEG', count: 175, color: '#f0883e' },
            { type: 'JAR', count: 87, color: '#d29922' },
            { type: 'DOCX', count: 74, color: '#388bfd' },
            { type: 'MP4', count: 31, color: '#a5d6ff' },
            { type: 'CSV', count: 19, color: '#8b949e' },
            { type: 'Другие', count: 361, color: '#6e7681' }
        ];

        const largeFiles = [
            { name: 'CapCut_7_8_0-beta2_...dmg', size: '1.1 ГБ', date: '19 дек 2025' },
            { name: 'GMT20251222-080518_Recording.mp4', size: '500 МБ', date: '22 дек 2025' },
            { name: 'MicrosoftTeams.pkg', size: '324 МБ', date: '17 окт 2024' },
            { name: 'Claude.dmg', size: '302 МБ', date: '29 апр 2025' },
            { name: 'MAX.dmg', size: '228 МБ', date: '20 мар 2025' },
            { name: 'comet_latest.dmg', size: '225 МБ', date: '1 окт 2025' },
            { name: 'bitrix24_desktop.dmg', size: '217 МБ', date: '8 авг 2024' },
            { name: 'GMT20260421-Recording_gallery.mp4', size: '174 МБ', date: '21 апр 2025' },
            { name: 'Yandex-4.dmg', size: '153 МБ', date: '8 мая 2024' },
            { name: 'GMT20260306-122847_Recording.mp4', size: '152 МБ', date: '6 мар 2025' }
        ];

        new Chart(document.getElementById('typesChart'), {
            type: 'doughnut',
            data: {
                labels: fileTypes.map(f => f.type),
                datasets: [{
                    data: fileTypes.map(f => f.count),
                    backgroundColor: fileTypes.map(f => f.color),
                    borderColor: '#161b22',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: {
                            color: '#e6edf3',
                            padding: 15,
                            font: { size: 12 }
                        }
                    }
                }
            }
        });

        new Chart(document.getElementById('extensionsChart'), {
            type: 'bar',
            data: {
                labels: fileTypes.slice(0, 8).map(f => f.type),
                datasets: [{
                    label: 'Файлов',
                    data: fileTypes.slice(0, 8).map(f => f.count),
                    backgroundColor: fileTypes.slice(0, 8).map(f => f.color),
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: {
                        ticks: { color: '#8b949e' },
                        grid: { color: '#21262d' }
                    },
                    y: {
                        ticks: { color: '#8b949e' },
                        grid: { color: '#21262d' }
                    }
                }
            }
        });

        const filesList = document.getElementById('filesList');
        largeFiles.forEach((file, i) => {
            filesList.innerHTML += `
                <div class="file-item">
                    <div class="file-rank">${i + 1}</div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-date">${file.date}</div>
                    </div>
                    <div class="file-size">${file.size}</div>
                </div>
            `;
        });
    </script>
</body>
</html>
